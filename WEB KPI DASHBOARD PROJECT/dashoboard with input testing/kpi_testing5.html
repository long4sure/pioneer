<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 KPI Tracker - Pioneer</title>
    <style>
        * { font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 20px; background-color: #f5f5f5; }
        .container {
            max-width: 100%;
            overflow-x: auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 { color: #2c3e50; margin: 0; }
        .subtitle {
            color: #7f8c8d;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .control-panel {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, button {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #b0c4de;
            font-size: 12px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #229954; }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            border: 1px solid #b0c4de;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #34495e;
            position: sticky;
            top: 0;
        }
        td { border: 1px solid #b0c4de; padding: 4px; }
        .category-header {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            text-align: left;
            padding: 8px 10px;
            font-size: 14px;
        }
        .subcategory-header {
            background-color: #85c1e9;
            font-weight: bold;
            text-align: left;
            padding: 6px 10px;
            font-size: 13px;
        }
        .kpi-name { 
            background-color: #ebf5fb; 
            width: 280px; 
            font-weight: 500;
        }
        .number-input {
            width: 80px;
            text-align: center;
            border: 1px solid #d5dbdb;
            border-radius: 3px;
            padding: 4px;
        }
        .target-column { background-color: #fef9e7; }
        .month-column { background-color: #ffffff; }
        .actual-column { background-color: #e8f8f5; }
        .forecast-badge {
            color: #e67e22;
            font-size: 10px;
            margin-left: 5px;
            font-style: italic;
        }
        .month-display {
            font-weight: bold;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PIONEER</h1>
        <div class="subtitle">2026 KPI TRACKER</div>
        
        <div class="control-panel">
            <select id="monthSelector">
                <option value="OCT">October</option>
                <option value="NOV">November</option>
                <option value="DEC">December</option>
                <option value="JAN">January</option>
                <option value="FEB">February</option>
                <option value="MAR">March</option>
                <option value="APR">April</option>
                <option value="MAY">May</option>
                <option value="JUN">June</option>
                <option value="JUL">July</option>
                <option value="AUG">August</option>
                <option value="SEP">September</option>
            </select>
            <button onclick="changeMonth()">Load Month</button>
            <button onclick="exportToCSV()">📥 Export to CSV</button>
            <span style="margin-left: auto; color: #7f8c8d;">
                Current: <span class="month-display" id="currentMonthDisplay">OCT</span>
            </span>
        </div>

        <table id="kpiTable">
            <thead>
                <tr>
                    <th style="width: 40px;">#</th>
                    <th style="width: 300px;">KPI</th>
                    <th style="width: 60px;">UoM</th>
                    <th style="width: 100px;">2026 TARGET</th>
                    <th style="width: 100px;" id="monthHeader">OCT</th>
                    <th style="width: 100px;">2026 ACTUAL</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const months = ['OCT', 'NOV', 'DEC', 'JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP'];
        let currentMonth = 'OCT';

        const kpiData = [
            // BUSINESS GOALS
            { id:1, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Conversion Cost (SC only)', uom:'PHP/KG' },
            { id:2, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Conversion Cost (Overall)', uom:'PHP/KG' },
            { id:3, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Conversion Cost vs Target', uom:'%' },
            { id:4, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Volume produced (MT) Actual', uom:'MT' },
            { id:5, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Volume produced (MT) Target', uom:'MT' },
            { id:6, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Volume produced %', uom:'%' },
            { id:7, cat:'BUSINESS GOALS', sub:'FILL RATE', kpi:'Achievement (Value)', uom:'%' },
            { id:8, cat:'BUSINESS GOALS', sub:'OTIF', kpi:'OTIF Rate', uom:'%' },
            { id:9, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Operational Cost - Actual', uom:'PHP' },
            { id:10, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Operational Cost - Budget', uom:'PHP' },
            { id:11, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Operational Cost %', uom:'%' },
            { id:12, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Capital Expenditures - Actual', uom:'PHP' },
            { id:13, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Capital Expenditures - Budget', uom:'PHP' },
            { id:14, cat:'BUSINESS GOALS', sub:'FINANCIALS', kpi:'Capital Expenditure %', uom:'%' },
            
            // OPERATIONAL OBJECTIVES
            { id:15, cat:'OPERATIONAL OBJECTIVES', sub:'Production Reports', kpi:'Output vs Target (planned)', uom:'%' },
            { id:16, cat:'OPERATIONAL OBJECTIVES', sub:'Production Reports', kpi:'Output Actual', uom:'MT' },
            { id:17, cat:'OPERATIONAL OBJECTIVES', sub:'Production Reports', kpi:'Output Target', uom:'MT' },
            { id:18, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Change Over Time', uom:'%' },
            { id:19, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Meeting', uom:'%' },
            { id:20, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Sanitation Time', uom:'%' },
            { id:21, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Start-up Time/Setup', uom:'%' },
            { id:22, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Testing Time', uom:'%' },
            { id:23, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Breaktime', uom:'%' },
            { id:24, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Breakdown', uom:'%' },
            { id:25, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Idle time', uom:'%' },
            { id:26, cat:'OPERATIONAL OBJECTIVES', sub:'Downtime Analysis', kpi:'Preventive Maintenance', uom:'%' },
            { id:27, cat:'OPERATIONAL OBJECTIVES', sub:'Production Reports', kpi:'Productive Time', uom:'%' },
            { id:28, cat:'OPERATIONAL OBJECTIVES', sub:'Production Reports', kpi:'Machine Utilization', uom:'%' },
            { id:29, cat:'OPERATIONAL OBJECTIVES', sub:'Inventory Reports', kpi:'DIO', uom:'days' },
            { id:30, cat:'OPERATIONAL OBJECTIVES', sub:'Inventory Reports', kpi:'Inventory Accuracy FG', uom:'%' },
            { id:31, cat:'OPERATIONAL OBJECTIVES', sub:'Inventory Reports', kpi:'Inventory Accuracy RMPM', uom:'%' },
            { id:32, cat:'OPERATIONAL OBJECTIVES', sub:'Warehouse Utilization', kpi:'Warehouse Utilization FG', uom:'%' },
            { id:33, cat:'OPERATIONAL OBJECTIVES', sub:'Warehouse Utilization', kpi:'Warehouse Utilization RMPM', uom:'%' },
            
            // S&OP Reports - Product Forecast
            { id:34, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'EPOXY (MARINE + CONSTRUCTION) - FORECAST', uom:'%' },
            { id:35, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'ELASTOSEAL - FORECAST', uom:'%' },
            { id:36, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'MIGHTY BOND - FORECAST', uom:'%' },
            { id:37, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'PRO-EPOXY - FORECAST', uom:'%' },
            { id:38, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'BUILDERS BOND - FORECAST', uom:'%' },
            { id:39, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'COATING MARINE - FORECAST', uom:'%' },
            { id:40, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'TRASPORTATION - FORECAST', uom:'%' },
            { id:41, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'OTHER CONSUMER - FORECAST', uom:'%' },
            { id:42, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'PRO-SEALANT - FORECAST', uom:'%' },
            { id:43, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'PRO-WATERPROOFING - FORECAST', uom:'%' },
            { id:44, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'PRO-PAINTING - FORECAST', uom:'%' },
            { id:45, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'PRO-ADHESIVES - FORECAST', uom:'%' },
            { id:46, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Product Forecast', kpi:'MINING - FORECAST', uom:'%' },
            
            // S&OP Reports - Location Philippines (FORECAST)
            { id:47, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'LOCAL PHILIPPINES Overall', uom:'%' },
            { id:48, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'GMA', uom:'%' },
            { id:49, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'NORTH LUZON', uom:'%' },
            { id:50, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'SOUTH LUZON', uom:'%' },
            { id:51, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'VISAYAS', uom:'%' },
            { id:52, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'MINDANAO', uom:'%' },
            { id:53, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'MODERN TRADE', uom:'%' },
            { id:54, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: PHILIPPINES (FORECAST)', kpi:'PSBSI', uom:'%' },
            
            // S&OP Reports - Export Locations (FORECAST)
            { id:55, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: EXPORT (FORECAST)', kpi:'EXPORT Overall', uom:'%' },
            { id:56, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: EXPORT (FORECAST)', kpi:'INDONESIA', uom:'%' },
            { id:57, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: EXPORT (FORECAST)', kpi:'INDIA', uom:'%' },
            { id:58, cat:'OPERATIONAL OBJECTIVES', sub:'S&OP Reports - Location: EXPORT (FORECAST)', kpi:'DIRECT EXPORT', uom:'%' },
            
            // WORKFORCE & LABOR - Attendance
            { id:59, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'Regular hours', uom:'hrs' },
            { id:60, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'Overtime hours', uom:'hrs' },
            { id:61, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'Overtime %', uom:'%' },
            { id:62, cat:'WORKFORCE & LABOR', sub:'Attendance - DL', kpi:'Regular hours DL', uom:'hrs' },
            { id:63, cat:'WORKFORCE & LABOR', sub:'Attendance - DL', kpi:'Overtime hours DL', uom:'hrs' },
            { id:64, cat:'WORKFORCE & LABOR', sub:'Attendance - DL', kpi:'Overtime % DL', uom:'%' },
            { id:65, cat:'WORKFORCE & LABOR', sub:'Attendance - IL', kpi:'Regular hours IL', uom:'hrs' },
            { id:66, cat:'WORKFORCE & LABOR', sub:'Attendance - IL', kpi:'Overtime hours IL', uom:'hrs' },
            { id:67, cat:'WORKFORCE & LABOR', sub:'Attendance - IL', kpi:'Overtime % IL', uom:'%' },
            { id:68, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'Absenteeism - Overall', uom:'%' },
            { id:69, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'# of Manpower', uom:'count' },
            { id:70, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'# of Absences', uom:'count' },
            { id:71, cat:'WORKFORCE & LABOR', sub:'Attendance', kpi:'# of Working days', uom:'count' },
            
            // Absenteeism per Line (moved under Attendance)
            { id:72, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L06 - EPOXY', uom:'%' },
            { id:73, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L04B - ELASTO', uom:'%' },
            { id:74, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L03 - CYANO TUBE', uom:'%' },
            { id:75, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L01 - COATINGS', uom:'%' },
            { id:76, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L07 - EPOXY TUBE', uom:'%' },
            { id:77, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'LINE 9 - EPS', uom:'%' },
            { id:78, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L10 - CONTACT BOND', uom:'%' },
            { id:79, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'GIP L11 - SILICONE', uom:'%' },
            { id:80, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L12 - SPECIAL - EPOXY BASED', uom:'%' },
            { id:81, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L13 - SPECIAL', uom:'%' },
            { id:82, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'LINE 14', uom:'%' },
            { id:83, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'L02 - CYNO BOTTLE / L05- EPOXY CLAY', uom:'%' },
            { id:84, cat:'WORKFORCE & LABOR', sub:'Attendance - Absenteeism per Line', kpi:'LABELING LINE', uom:'%' },
            
            // PROCUREMENT
            { id:85, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (Actual)', uom:'Php' },
            { id:86, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (Target)', uom:'Php' },
            { id:87, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (%)', uom:'%' }
        ];

        // Initialize all values to zero
        kpiData.forEach(item => {
            item.target = 0;
            item.monthValues = {};
            months.forEach(m => item.monthValues[m] = 0);
            item.actual = 0;
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            // Update month header
            document.getElementById('monthHeader').textContent = currentMonth;
            document.getElementById('currentMonthDisplay').textContent = currentMonth;
            
            let lastCat = '', lastSub = '';
            
            kpiData.forEach(item => {
                // Add category header if new category
                if (item.cat !== lastCat) {
                    const catRow = document.createElement('tr');
                    catRow.innerHTML = `<td colspan="6" class="category-header">${item.cat}</td>`;
                    tbody.appendChild(catRow);
                    lastCat = item.cat;
                    lastSub = '';
                }
                
                // Add subcategory header if new subcategory
                if (item.sub !== lastSub) {
                    const subRow = document.createElement('tr');
                    subRow.innerHTML = `<td colspan="6" class="subcategory-header">${item.sub}</td>`;
                    tbody.appendChild(subRow);
                    lastSub = item.sub;
                }
                
                const row = document.createElement('tr');
                
                // Add forecast indicator if needed
                let kpiDisplay = item.kpi;
                if (item.sub.includes('FORECAST')) {
                    kpiDisplay = item.kpi + ' <span class="forecast-badge">(forecast)</span>';
                }
                
                row.innerHTML = `
                    <td style="text-align:center">${item.id}</td>
                    <td class="kpi-name">${kpiDisplay}</td>
                    <td style="text-align:center">${item.uom}</td>
                    <td class="target-column"><input type="number" value="${item.target}" class="number-input" onchange="updateTarget(${item.id}, this.value)"></td>
                    <td class="month-column"><input type="number" value="${item.monthValues[currentMonth]}" class="number-input" onchange="updateMonthValue(${item.id}, '${currentMonth}', this.value)"></td>
                    <td class="actual-column"><input type="number" value="${item.actual}" class="number-input" onchange="updateActual(${item.id}, this.value)"></td>
                `;
                tbody.appendChild(row);
            });
        }

        window.updateTarget = (id, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.target = val === '' ? 0 : parseFloat(val);
        };
        
        window.updateMonthValue = (id, month, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.monthValues[month] = val === '' ? 0 : parseFloat(val);
        };
        
        window.updateActual = (id, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.actual = val === '' ? 0 : parseFloat(val);
        };

        window.changeMonth = () => {
            const selector = document.getElementById('monthSelector');
            currentMonth = selector.value;
            renderTable();
        };

        window.exportToCSV = () => {
            // Create CSV with the exact column structure
            let csv = '#,KPI,UoM,2026 TARGET,Month,2026 ACTUAL,Category,Subcategory,IsForecast\n';
            
            kpiData.forEach(item => {
                const isForecast = item.sub.includes('FORECAST') ? 'Yes' : 'No';
                // Clean KPI name for CSV (remove HTML)
                const cleanKpi = item.kpi.replace(/<[^>]*>/g, '');
                
                csv += `${item.id},"${cleanKpi}",${item.uom},${item.target},${item.monthValues[currentMonth]},${item.actual},"${item.cat}","${item.sub}","${isForecast}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kpi_tracker_${currentMonth}_2026.csv`;
            a.click();
        };

        renderTable();
    </script>
</body>
</html>
