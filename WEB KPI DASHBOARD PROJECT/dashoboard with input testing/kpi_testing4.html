<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 KPI Tracker - October Only</title>
    <style>
        * { font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 20px; background-color: #f5f5f5; }
        .container {
            max-width: 100%;
            overflow-x: auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 { color: #2c3e50; margin: 0; }
        .subtitle {
            color: #7f8c8d;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            border: 1px solid #b0c4de;
        }
        th {
            background-color: #2c3e50;
            color: white;
            padding: 8px 4px;
            border: 1px solid #34495e;
        }
        td { border: 1px solid #b0c4de; padding: 4px; }
        .category-header {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            padding: 8px 10px;
        }
        .subcategory-header {
            background-color: #85c1e9;
            font-weight: bold;
            padding: 6px 10px;
        }
        .kpi-name { background-color: #ebf5fb; width: 250px; }
        .month-input {
            width: 80px;
            text-align: center;
            border: 1px solid #d5dbdb;
            border-radius: 3px;
            padding: 4px;
        }
        button {
            margin-bottom: 15px;
            padding: 8px 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

        <button onclick="exportToCSV()">📥 Export to CSV</button>

                    <th>OCT Value</th>
                    <th>2026 YTD Actual</th>

            <tbody id="tableBody"></tbody>

            // PROCUREMENT
            { id:85, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (Actual)', uom:'Php' },
            { id:86, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (Target)', uom:'Php' },
            { id:87, cat:'PROCUREMENT', sub:'Savings', kpi:'Savings (%)', uom:'%' }
        ];

        // Initialize all values to zero
        kpiData.forEach(item => {
            item.target = 0;
            item.octValue = 0;
            item.ytdActual = 0;
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let lastCat = '', lastSub = '';
            
            kpiData.forEach(item => {
                if (item.cat !== lastCat) {
                    const catRow = document.createElement('tr');
                    catRow.innerHTML = `<td colspan="6" class="category-header">${item.cat}</td>`;
                    tbody.appendChild(catRow);
                    lastCat = item.cat;
                    lastSub = '';
                }
                
                if (item.sub !== lastSub) {
                    const subRow = document.createElement('tr');
                    subRow.innerHTML = `<td colspan="6" class="subcategory-header">${item.sub}</td>`;
                    tbody.appendChild(subRow);
                    lastSub = item.sub;
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="text-align:center">${item.id}</td>
                    <td class="kpi-name">${item.kpi}</td>
                    <td style="text-align:center">${item.uom}</td>
                    <td><input type="number" value="${item.target}" style="width:80px; padding:4px;" onchange="updateTarget(${item.id}, this.value)"></td>
                    <td><input type="number" value="${item.octValue}" style="width:80px; padding:4px;" onchange="updateOctValue(${item.id}, this.value)"></td>
                    <td><input type="number" value="${item.ytdActual}" style="width:80px; padding:4px; background-color:#e8f8f5;" onchange="updateYTD(${item.id}, this.value)"></td>
                `;
                tbody.appendChild(row);
            });
        }

        window.updateTarget = (id, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.target = val === '' ? 0 : parseFloat(val);
        };
        
        window.updateOctValue = (id, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.octValue = val === '' ? 0 : parseFloat(val);
        };
        
        window.updateYTD = (id, val) => {
            const item = kpiData.find(k => k.id === id);
            if (item) item.ytdActual = val === '' ? 0 : parseFloat(val);
        };

        window.exportToCSV = () => {
            let csv = 'Category,Subcategory,KPI,UoM,Target,OCT_Value,2026_YTD_Actual,KPI_ID\n';
            kpiData.forEach(item => {
                csv += `"${item.cat}","${item.sub}","${item.kpi}","${item.uom}",${item.target},${item.octValue},${item.ytdActual},${item.id}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kpi_tracker_october_2026.csv';
            a.click();
        };

        renderTable();
    </script>
</body>
</html>
