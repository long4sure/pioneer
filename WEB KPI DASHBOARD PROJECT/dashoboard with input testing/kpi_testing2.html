        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let lastCategory = '';
            let lastSubcategory = '';
            let lastSubSubcategory = '';
            
            kpiData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'kpi-row';
                
                // Add category header if new category
                if (item.category !== lastCategory) {
                    const categoryRow = document.createElement('tr');
                    categoryRow.innerHTML = `<td colspan="17" class="category-header">${item.category}</td>`;
                    tbody.appendChild(categoryRow);
                    lastCategory = item.category;
                    lastSubcategory = '';
                    lastSubSubcategory = '';
                }
                
                // Add subcategory header if new subcategory
                if (item.subcategory !== lastSubcategory) {
                    const subRow = document.createElement('tr');
                    subRow.innerHTML = `<td colspan="17" class="subcategory-header">${item.subcategory}</td>`;
                    tbody.appendChild(subRow);
                    lastSubcategory = item.subcategory;
                }
                
                // Row number
                const numCell = document.createElement('td');
                numCell.textContent = item.id;
                numCell.style.textAlign = 'center';
                row.appendChild(numCell);
                
                // KPI Name (with indentation for hierarchical display)
                const nameCell = document.createElement('td');
                if (item.kpi.startsWith(' ') || item.subcategory.includes('Downtime') || 
                    item.subcategory.includes('Location') || item.subcategory.includes('Productivity')) {
                    nameCell.className = 'indented-kpi';
                } else {
                    nameCell.className = 'kpi-name';
                }
                nameCell.textContent = item.kpi;
                if (item.hasFormula) {
                    nameCell.innerHTML += ' <span class="formula-badge">fx</span>';
                }
                row.appendChild(nameCell);
                
                // UoM
                const uomCell = document.createElement('td');
                uomCell.className = 'uom';
                uomCell.textContent = item.uom;
                row.appendChild(uomCell);
                
                // Target
                const targetCell = document.createElement('td');
                targetCell.className = 'target';
                targetCell.textContent = item.target !== null ? item.target : '-';
                row.appendChild(targetCell);
                
                // Month columns
                months.forEach(month => {
                    const monthCell = document.createElement('td');
                    monthCell.style.padding = '2px';
                    
                    let value = item.months[month];
                    const isFormula = typeof value === 'string' && value.startsWith('=');
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'month-input';
                    input.dataset.id = item.id;
                    input.dataset.month = month;
                    
                    if (isFormula) {
                        input.value = 'formula';
                        input.classList.add('formula-cell');
                        input.readOnly = true;
                        input.title = value; // Show formula on hover
                    } else {
                        input.value = value !== undefined ? value : '';
                        input.addEventListener('change', function(e) {
                            updateMonthValue(item.id, month, e.target.value);
                        });
                    }
                    
                    monthCell.appendChild(input);
                    row.appendChild(monthCell);
                });
                
                // Actual
                const actualCell = document.createElement('td');
                actualCell.className = 'actual-cell';
                const actualInput = document.createElement('input');
                actualInput.type = 'text';
                actualInput.className = 'month-input';
                actualInput.value = item.actual !== null ? item.actual : '';
                actualInput.style.backgroundColor = '#e8f8f5';
                actualInput.addEventListener('change', function(e) {
                    updateActualValue(item.id, e.target.value);
                });
                actualCell.appendChild(actualInput);
                row.appendChild(actualCell);
                
                tbody.appendChild(row);
            });
            
            // Update counters
            document.getElementById('totalKpis').textContent = kpiData.length;
            document.getElementById('kpiCount').textContent = `Total KPIs: ${kpiData.length}`;
        }

        function updateMonthValue(id, month, value) {
            const item = kpiData.find(k => k.id === id);
            if (item) {
                item.months[month] = value ? (isNaN(value) ? value : parseFloat(value)) : '';
                document.getElementById('saveStatus').textContent = 'Changes saved ✓';
                document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
                setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
            }
        }

        function updateActualValue(id, value) {
            const item = kpiData.find(k => k.id === id);
            if (item) {
                item.actual = value ? (isNaN(value) ? value : parseFloat(value)) : '';
            }
        }

        function calculateFormulas() {
            kpiData.forEach(item => {
                if (item.hasFormula) {
                    months.forEach((month, idx) => {
                        let formula = item.months[month];
                        if (typeof formula === 'string' && formula.startsWith('=')) {
                            // Parse formula references
                            if (item.id === 3) { // Conversion Cost vs Target
                                const ref1 = kpiData[0].months[month] || 0; // SC only
                                const ref2 = kpiData[0].target || 1;
                                item.months[month] = ref2 !== 0 ? Number((ref1 / ref2).toFixed(3)) : 0;
                            }
                            else if (item.id === 11) { // Operational Cost %
                                const actual = kpiData[8].months[month] || 0; // Op Cost Actual
                                const budget = kpiData[9].months[month] || 1; // Op Cost Budget
                                item.months[month] = budget !== 0 ? Number((actual / budget).toFixed(3)) : 0;
                            }
                            else if (item.id === 14) { // Capital Expenditure %
                                const actual = kpiData[11].months[month] || 0; // CapEx Actual
                                const budget = kpiData[12].months[month] || 1; // CapEx Budget
                                item.months[month] = budget !== 0 ? Number((actual / budget).toFixed(3)) : 0;
                            }
                            else if (item.id === 87) { // Savings %
                                const actual = kpiData[84].months[month] || 0; // Savings Actual
                                const budget = kpiData[85].months[month] || 1; // Savings Target
                                item.months[month] = budget !== 0 ? Number((actual / budget).toFixed(3)) : 0;
                            }
                        }
                    });
                }
            });
            renderTable();
            document.getElementById('saveStatus').textContent = 'Formulas calculated ✓';
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
            setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
        }

        function exportToCSV() {
            let csv = 'Category,Subcategory,KPI,UoM,2026 TARGET,Month,Month Value,2026 ACTUAL\n';
            
            kpiData.forEach(item => {
                months.forEach(month => {
                    const monthValue = item.months[month];
                    // Skip formula strings in export
                    const valueToExport = typeof monthValue === 'string' && monthValue.startsWith('=') ? '' : monthValue;
                    
                    csv += `"${item.category}","${item.subcategory}","${item.kpi}","${item.uom}",${item.target || ''},${month},${valueToExport || ''},${item.actual || ''}\n`;
                });
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kpi_tracker_2026_complete_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            document.getElementById('saveStatus').textContent = 'CSV exported ✓';
            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
            setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
        }

        function resetToDefault() {
            if (confirm('Reset all values to default?')) {
                location.reload();
            }
        }

        function showSummary() {
            const totalKpis = kpiData.length;
            const categories = [...new Set(kpiData.map(k => k.category))];
            const subcategories = [...new Set(kpiData.map(k => k.subcategory))];
            
            let summary = `=== KPI TRACKER SUMMARY ===\n`;
            summary += `Total KPIs: ${totalKpis}\n`;
            summary += `Categories: ${categories.length}\n`;
            summary += `Subcategories: ${subcategories.length}\n\n`;
            
            categories.forEach(cat => {
                const catKpis = kpiData.filter(k => k.category === cat);
                summary += `${cat}: ${catKpis.length} KPIs\n`;
            });
            
            alert(summary);
        }

        // Initialize table
        renderTable();
    </script>
</body>
</html>
